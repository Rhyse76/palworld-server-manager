<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3ad6ad"/>
      <stop offset="1" stop-color="#12695a"/>
    </linearGradient>
    <linearGradient id="unit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9f6f2"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="16"/>

  <!-- three stacked "server" units -->
  <g>
    <rect x="252" y="288" width="520" height="128" rx="30" fill="url(#unit)"/>
    <circle cx="330" cy="352" r="22" fill="#25c9a4"/>
    <rect x="392" y="338" width="300" height="14" rx="7" fill="#25c9a4" opacity="0.35"/>
    <rect x="392" y="366" width="220" height="14" rx="7" fill="#25c9a4" opacity="0.22"/>

    <rect x="252" y="448" width="520" height="128" rx="30" fill="url(#unit)"/>
    <circle cx="330" cy="512" r="22" fill="#25c9a4"/>
    <rect x="392" y="498" width="300" height="14" rx="7" fill="#25c9a4" opacity="0.35"/>
    <rect x="392" y="526" width="220" height="14" rx="7" fill="#25c9a4" opacity="0.22"/>

    <rect x="252" y="608" width="520" height="128" rx="30" fill="url(#unit)"/>
    <circle cx="330" cy="672" r="22" fill="#25c9a4"/>
    <rect x="392" y="658" width="300" height="14" rx="7" fill="#25c9a4" opacity="0.35"/>
    <rect x="392" y="686" width="220" height="14" rx="7" fill="#25c9a4" opacity="0.22"/>
  </g>
</svg>
